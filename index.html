<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="small-world-favicon.png"> <!-- A simple favicon I made using the S of Small & W of World -->
  <title>It's a Small World</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script><!-- D3.js — the whole graph runs on this: nodes, edges, physics, zoom, drag, transitions, Bostock, Mike. D3.js. Observable, 2011. https://d3js.org-->

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet"> <!-- Manrope Font used throughout the site -->

  <style>

    /*////// FONTS //////*/

    @font-face {
      font-family: 'Lombard';
      src: url('fonts/Lombard-regular.otf') format('opentype');
    }
    @font-face {
      font-family: 'Manrope';
      src: url('fonts/Manrope-VariableFont_wght.ttf') format('truetype');
      font-weight: 200 800;
      font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ddd;
      font-family: 'Manrope', sans-serif;
      overflow: hidden;
    }


    /*////// INTRO SCREEN //////*/

    /* Covers the whole page on load — same system as Finite Grids start screen, removed after Start button is clicked */
    #intro-container {
      position: fixed;
      width: 100vmax;
      height: 100vmax;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      will-change: clip-path;
      backface-visibility: hidden;
    }

    /* The intro sits on top. When Start is clicked, it transitions as a collapse to the dot at centre,
       revealing the graph underneath. Source: Argyle, Adam. "transition.style — out:circle:center".
       https://www.transition.style/#out:circle:center */
    .animate-out {
      animation: circle-out 3s cubic-bezier(0.25, 1, 0.30, 1) forwards;
      pointer-events: none;
    }
    @keyframes circle-out {
      from { clip-path: circle(125% at 50% 50%); }
      to   { clip-path: circle(0%   at 50% 50%); }
    }

    #graph-wrapper {
      position: fixed;
      inset: 0;
    }


    /*////// INTRO TITLE BLOCK //////*/

    /* This is like a grouped styling of the It's a & Small & World that make up the full title */
    .intro-title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* clamp keeps the whole block from getting too tall on big monitors, this was very annoying took a number of tries to get right because it worked differently on different screens */
    }

    /* 'It's a' — smaller than Small World but same Lombard family */
    .intro-top {
      font-family: 'Lombard', serif;
      font-size: clamp(24px, 5vw, 80px);
      line-height: 1;
      color: #bbb;
      text-align: center;
      margin-bottom: -0.1em;
    }

    /* Small World - styling for only the main large title text */
    .intro-display {
      font-family: 'Lombard', serif;
      font-size: clamp(72px, 16vw, 260px);
      line-height: 0.88;
      text-align: center;
      color: #fff;
    }

    /* Start button — solid white fill on hover */
    .start-btn {
      background: transparent;
      border: 1px solid #444;
      border-radius: 100px;
      color: #777;
      padding: 14px 50px;
      margin-top: 48px;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.25s, border-color 0.25s, color 0.25s;
    }

    .start-btn:hover { background: #fff; border-color: #fff; color: #111; }
    .start-btn:active { transform: scale(0.95); background: #ddd; border-color: #ddd; color: #111; transition: transform 0.08s, background-color 0.08s; }


    /*////// GRAPH //////*/

    #svg { width: 100vw; height: 100vh; display: block; }


    /*////// PANELS - Heavily based on what I saw on Obsidian and liked and wanted to implement into my D3JS graph //////*/

    /* Source: MDN. position fixed. https://developer.mozilla.org/en-US/docs/Web/CSS/position */
    #bottom-right {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 10;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .panel {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      width: 220px;
    }

    /* Source: MDN. cursor. https://developer.mozilla.org/en-US/docs/Web/CSS/cursor */
    .panel-title {
      font-family: 'Manrope', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      padding: 13px 15px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      user-select: none;
    }
    .panel-title:hover { color: #ccc; }
    .panel-chevron { font-size: 8px; opacity: 0.5; }

    /* Source: MDN. display none. https://developer.mozilla.org/en-US/docs/Web/CSS/display */
    .panel-body { padding: 0 15px 13px 15px; min-height: 220px; }
    .panel.collapsed .panel-body { display: none; }


    /* The 'show relationships' button, it was always there just hidden because it was getting excessive but I liked the idea of having it accessible to be shown if preferred since it's something I really wanted early on.
       Source: MDN. CSS :hover. https://developer.mozilla.org/en-US/docs/Web/CSS/:hover */
    .rel-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #333;
      border-radius: 20px;
      color: #888;
      font-family: 'Manrope', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 0;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s, border-color 0.2s;
    }
    .rel-btn:hover { background: #fff; color: #111; border-color: #fff; }
    .rel-btn.active { background: #fff; color: #111; border-color: #fff; }
    .rel-btn.active:hover { background: #ddd; border-color: #ddd; }

    /*////// KEY — two columns //////*/

    /* I originally had the list of categories in the key as a single column but it became too long and overlapped onto too much of the graph so I split it into two */
    /* Source: MDN. CSS Grid Layout. https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_grid_layout */
    #key-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px 12px;
    }

    .key-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9.5px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap; /* added this because Wizarding World was breaking to two lines */
      overflow: hidden;
    }

    .key-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }


    /*////// FORCES SLIDERS //////*/

    /* Source: MDN. input type range. https://developer.mozilla.org/en-US/docs/Web/HTML/Element/input/range */
    .row { margin-bottom: 9px; }
    .row:last-child { margin-bottom: 0; }

    .row label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      font-weight: 500; 
      color: #fff; 
      margin-bottom: 4px;
    }

    .row label span {
      font-weight: 700;
      color: #ddd;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2px;
      background: #333;
      cursor: pointer;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px;
      background: #aaa; border-radius: 50%;
    }

    input[type="range"]::-moz-range-thumb {
      width: 11px; height: 11px;
      background: #aaa; border-radius: 50%; border: none;
    }


    /*////// HOVER TOOLTIP //////*/

    /* Floats near the hovered node, sort of based on the Epstein Visualizer site I found */
    /* Source: D3 Graph Gallery. Tooltip. https://d3-graph-gallery.com/graph/interactivity_tooltip.html */
    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 11px 14px;
      min-width: 170px;
      max-width: 250px;
      opacity: 0;
      transition: opacity 0.1s;
    }

    #tooltip.visible { opacity: 1; }

    #tt-name {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1px;
    }

    /* styling for the group label */
    #tt-group {
      font-size: 10px;
      font-weight: 500;
      color: #888;
      margin-bottom: 10px;
    }

    /* styling for the list of connections */
    #tt-links {
      font-size: 10px;
      font-weight: 400;
      line-height: 1.9;
      color: #bbb;
      border-top: 1px solid #2a2a2a;
      padding-top: 9px;
      max-height: 180px;
      overflow-y: auto;
    }

    /* styling for the relationship type in the pop up window */
    #tt-links .rel  { font-weight: 700; color: #fff; }
    #tt-links .name { font-weight: 400; color: #bbb; }


    /*////// ABOUT LINK //////*/

    #bottom-left {
      position: fixed;
      bottom: 20px; left: 18px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    #about-link, #join-link {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #888;
      text-decoration: none;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 6px 14px;
      transition: background-color 0.25s, color 0.25s, border-color 0.25s;
    }

    #about-link:hover, #join-link:hover { background: #fff; color: #111; border-color: #fff; }

    /* Degree of separation line in tooltip */
    #tt-degree {
      font-size: 10px;
      font-weight: 500;
      color: #666;
      margin-bottom: 10px;
    }

    /*////// MOBILE OPTIMIZATION //////*/
  
    @media (max-width: 600px) {

      /* Panels shrink so they don't overflow the screen */
      .panel { width: 155px; }
      .panel-title { font-size: 10px; padding: 10px 12px; }
      .panel-body { padding: 0 10px 10px 10px; min-height: 0; }
      .key-item { font-size: 8.5px; }
      .key-dot { width: 6px; height: 6px; }
      #key-grid { gap: 4px 8px; }
      .row label { font-size: 9px; }
      .rel-btn { font-size: 8px; padding: 5px 0; }

      /* Bottom-right panel pair — tighter gap on mobile */
      #bottom-right { gap: 6px; bottom: 12px; right: 12px; }

      /* About + Join List — visible on mobile, smaller */
      #bottom-left { bottom: 12px; left: 12px; gap: 6px; }
      #about-link, #join-link {
        font-size: 8px;
        padding: 5px 10px;
        letter-spacing: 0.07em;
      }
    }



    /*////// NODE GROUPS — smooth hover fade //////*/
    svg g.node-group {
      transition: opacity 0.25s ease;
    }

    /*////// EDGE LABELS — hidden by default, toggled by 'Show Relationships' button //////*/
    .elabel {
      font-family: 'Manrope', sans-serif;
      font-size: 4.5px;
      font-weight: 400;
      fill: #555;
      pointer-events: none;
      user-select: none;
      display: none;
    }
    .elabel.visible { display: block; }

    /*////// NODE LABELS //////*/

    .node-label {      font-family: 'Manrope', sans-serif;
      font-size: 6px;
      font-weight: 500;
      fill: #fff;
      pointer-events: none;
      user-select: none;
    }

    /* My node only - 'Ayaan Ahmed' node in the centre */
    .node-label-me {
      font-size: 9px;
      font-weight: 700;
      fill: #fff;
    }

  </style>

        </div>
      </div>
    </div>
    <div class="panel" id="slider-panel">

      <div class="panel-body">
        <div class="row">

          <input type="range" id="s-center" min="0" max="0.5" value="0.5" step="0.01">
        </div>
        <div class="row">
          <label>Repel Force <span id="v-charge">-1200</span></label>
          <input type="range" id="s-charge" min="-1200" max="-30" value="-1200" step="10">

        </div>
        <div class="row">
          <label>Link Distance <span id="v-dist">400</span></label>
          <input type="range" id="s-dist" min="20" max="400" value="400" step="5">
        </div>
      </div>
    </div>
  </div>

    ///// — GRAPH ENGINE — /////
    // Everything below here draws and runs the actual graph using D3.js
    // Core reference: Bostock, M. Force-Directed Graph. Observable, 2023. https://observablehq.com/@d3/force-directed-graph/2


    ///// 4. START /////
    function startExperience() {

      // Source: MDN. Main thread. https://developer.mozilla.org/en-US/docs/Glossary/Main_thread
      buildGraph();

      const intro = document.getElementById('intro-container');

      // Source: Argyle, Adam. transition.style. https://www.transition.style/#out:circle:center (this is the same site i got the finite grids transition)
      intro.classList.add('animate-out');

      // Source: MDN. setTimeout. https://developer.mozilla.org/en-US/docs/Web/API/setTimeout
      setTimeout(() => { intro.style.display = 'none'; }, 3100);

      // Plays the Among us sound effect at the exact same moment the animation starts
      // Source: MDN. HTMLAudioElement. https://developer.mozilla.org/en-US/docs/Web/API/HTMLAudioElement
      const audio = new Audio("reveal.mp3");
      audio.play().catch(() => {});
    }


    ///// 5. DEDUPLICATE NODES /////

    // Some people appear multiple times in the NODES array — once in their general category
    // Source: MDN. Map. https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Map

    const nodeMap = new Map(); // Creates an empty Map to hold id
    NODES.forEach(n => nodeMap.set(n.id, n)); // Adds each node, duplicates overwrite earlier entries
    const dedupedNodes = Array.from(nodeMap.values());


    ///// 6. CONNECTION COUNT /////

    // Source: Observable. d3-scale scaleSqrt. https://d3js.org/d3-scale#scaleSqrt
    const connCount = new Map();
    EDGES.forEach(e => {
      connCount.set(e.source, (connCount.get(e.source) || 0) + 1); 
      connCount.set(e.target, (connCount.get(e.target) || 0) + 1);
    });

    // Source: Observable. d3-scale scaleSqrt. https://d3js.org/d3-scale#scaleSqrt
    const maxConn = d3.max(dedupedNodes, d => connCount.get(d.id) || 0); // Find the highest count
    const rScale = d3.scaleSqrt()
      .domain([0, maxConn]) 
      .range([2, 7]);

    
    // my node is always 14px so it clearly anchors the centre of the graph
    function nodeR(d) {
      if (d.id === "Ayaan Ahmed") return 14; // Fixed large radius only for my node which is always in the centre
      return Math.max(2, rScale(connCount.get(d.id) || 0));
    }


    ///// 7. BUILD GRAPH /////

    // buildGraph() creates the entire SVG visualization
    function buildGraph() {
      const bfsAdj = new Map();
      EDGES.forEach(e => {
        const s = e.source, t = e.target;
        if (!bfsAdj.has(s)) bfsAdj.set(s, []);
        if (!bfsAdj.has(t)) bfsAdj.set(t, []);
        bfsAdj.get(s).push(t);
        bfsAdj.get(t).push(s);
      });
      const degreeMap = new Map();
      degreeMap.set("Ayaan Ahmed", 0);
      const bfsQ = ["Ayaan Ahmed"];
      while (bfsQ.length) {
        const cur = bfsQ.shift();
        (bfsAdj.get(cur) || []).forEach(nb => {
          if (!degreeMap.has(nb)) { degreeMap.set(nb, degreeMap.get(cur) + 1); bfsQ.push(nb); }
        });
      }
      const ordinals = ["", "1st", "2nd", "3rd", "4th", "5th", "6th", "7th"];

      const W = window.innerWidth; 
      const H = window.innerHeight; 
      const svg = d3.select("#svg"); 
      const g = svg.append("g");   


      ///// ZOOM /////

      // d3.zoom lets the user scroll to zoom and drag to pan the entire graph
      // Source: Bostock, M. d3-zoom. https://d3js.org/d3-zoom
      const zoomBehavior = d3.zoom().scaleExtent([0.05, 10])
        .on("zoom", event => g.attr("transform", event.transform)); 
      svg.call(zoomBehavior); 


      ///// SLIDERS /////

      // I visually tested which force slider options work the best and chose these as the default the site starts out with
      let centerVal   = 0.5;   // Strength of the force pulling all nodes toward the centre
      let chargeVal   = -1200; // Repulsion between nodes
      let linkStrVal  = 0.05;  // How strongly edges pull their two nodes together
      let linkDistVal = 400;   // How long each connector line tries to be

      // Find my node in the array and pin it to the exact centre of the screen
      // Source: Bostock, M. d3-force. https://d3js.org/d3-force/simulation#simulation_nodes
      const myNode = dedupedNodes.find(n => n.id === "Ayaan Ahmed");
      if (myNode) { myNode.fx = W / 2; myNode.fy = H / 2; } // Locks my node to screen centre

      // Source: Bostock, M. d3-force forceLink.distance. https://d3js.org/d3-force/link#link_distance
      function linkDist(d) {
        const s = d.source.id || d.source; 
        const t = d.target.id || d.target; 
        if (s === "Ayaan Ahmed" || t === "Ayaan Ahmed") return 80;
        return linkDistVal; 
      }

      // Source: Bostock, M. d3-force simulation. https://d3js.org/d3-force/simulation
      const simulation = d3.forceSimulation(dedupedNodes)
        .force("link",    d3.forceLink(EDGES).id(d => d.id).distance(linkDist).strength(linkStrVal)) 
        .force("charge",  d3.forceManyBody().strength(chargeVal)) 
        .force("x",       d3.forceX(W / 2).strength(centerVal))  
        .force("y",       d3.forceY(H / 2).strength(centerVal))  
        .force("collide", d3.forceCollide().radius(d => nodeR(d) + 3)); // Stops nodes from overlapping, doesn't work the best though probably because it doesnt sense the fluctuating texts synced to the nodes.

      // Source: Bostock, M. d3-force simulation.tick. https://d3js.org/d3-force/simulation#simulation_tick
      simulation.stop(); // Pause the live sim
      for (let i = 0; i < 500; i++) simulation.tick();


      ///// RELATIONSHIP CONNECTORS /////

      // Draw all 1,620 connector lines
      // Source: Bostock, M. d3-selection join. https://d3js.org/d3-selection/joining
      const link = g.append("g") 
        .selectAll("line").data(EDGES).join("line") 
        .attr("stroke", "#444")        
        .attr("stroke-width", 0.6)     
        .attr("stroke-opacity", 0.8)  
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y) 
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

      // Edge labels — the relationship text (e.g. "Worked with", "met")
      const edgeLabel = g.append("g")
        .selectAll("text").data(EDGES).join("text") 
        .attr("class", "elabel")       
        .attr("text-anchor", "middle") 
        .attr("x", d => (d.source.x + d.target.x) / 2) 
        .attr("y", d => (d.source.y + d.target.y) / 2)
        .text(d => d.rel); 


      ///// NODES /////

      // This lets hover instantly look up who a node connects to without scanning all 1,620 connector lines
      // Source: MDN. Map. https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Map
      const clickAdj = new Map(); // Map from node id → array of { name, rel } objects
      EDGES.forEach(e => {
        const srcId = typeof e.source === 'object' ? e.source.id : e.source; 
        const tgtId = typeof e.target === 'object' ? e.target.id : e.target;
        if (!clickAdj.has(srcId)) clickAdj.set(srcId, []); 
        clickAdj.get(srcId).push({ name: tgtId, rel: e.rel }); 
      });

      const regularNodes = dedupedNodes.filter(n => n.id !== "Ayaan Ahmed"); 
      const myNodeData   = dedupedNodes.filter(n => n.id === "Ayaan Ahmed"); 

      function makeNodeGroup(data, isMe) {
        const grp = g.append("g")
          .selectAll("g").data(data).join("g") 
          .attr("class", "node-group")
          .style("cursor", "pointer")  
          .call(
            // Drag behaviour like Obsidian, lets users physically move nodes around the graph, it's one of the fun interactive things
            // Source: Bostock, M. d3-drag. https://d3js.org/d3-drag
            d3.drag()
              .on("start", (ev, d) => {
                if (!ev.active) simulation.alphaTarget(0.3).restart();
                if (d.id !== "Ayaan Ahmed") { d.fx = d.x; d.fy = d.y; } 
              })
              .on("drag",  (ev, d) => { if (d.id !== "Ayaan Ahmed") { d.fx = ev.x; d.fy = ev.y; } }) // Move with mouse
              .on("end",   (ev, d) => { if (!ev.active) simulation.alphaTarget(0); if (d.id !== "Ayaan Ahmed") { d.fx = null; d.fy = null; } }) 
          );

        grp.append("circle")
          .attr("r", d => nodeR(d)) 
          .attr("fill", d => GROUPS[d.group].color)
          .attr("stroke", "#111")     
          .attr("stroke-width", isMe ? 1.5 : 0.5);

        grp.append("text")
          .attr("class", d => d.id === "Ayaan Ahmed" ? "node-label node-label-me" : "node-label")
          .attr("data-nid", d => d.id) 
          .attr("text-anchor", "middle")
          .attr("dy", d => nodeR(d) + 8) 
          .text(d => d.id); 

        grp.attr("transform", d => `translate(${d.x},${d.y})`); 
        return grp;
      }

      // Source: Bostock, M. d3-selection join. https://d3js.org/d3-selection/joining
      const node = g.append("g").selectAll("g").data(regularNodes).join("g")
        .attr("class", "node-group")
        .style("cursor", "pointer")
        .call(
          d3.drag()
            .on("start", (ev, d) => { if (!ev.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on("drag",  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
            .on("end",   (ev, d) => { if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      node.append("circle") // Draws a circle for each regular node, the actual node itself
        .attr("r", d => nodeR(d))
        .attr("fill", d => GROUPS[d.group].color)
        .attr("stroke", "#111")
        .attr("stroke-width", 0.5);

      node.append("text") // creates the name label for each node
        .attr("class", "node-label")
        .attr("data-nid", d => d.id)
        .attr("text-anchor", "middle")
        .attr("dy", d => nodeR(d) + 8)
        .text(d => d.id);
      const myNodeGrp = makeNodeGroup(myNodeData, true);
      const allNodes = [node, myNodeGrp];


      ///// HOVER /////

      // Source: Bostock, M. d3-selection events. https://d3js.org/d3-selection/events
      const tooltip = d3.select("#tooltip"); 
      // This dims everyone not connected to the hovered node
      function applyHover(ev, d) {

        const connectedIds = new Set([d.id]);
        EDGES.forEach(l => {
          const sid = l.source.id || l.source;
          const tid = l.target.id || l.target;
          if (sid === d.id) connectedIds.add(tid); 
          if (tid === d.id) connectedIds.add(sid); 
        });

        allNodes.forEach(grp => grp.style("opacity", n => connectedIds.has(n.id) ? 1 : 0.05));

        link
          .attr("stroke", l => {
            const sid = l.source.id || l.source;
            const tid = l.target.id || l.target;
            return (sid === d.id || tid === d.id) ? "#bbb" : "#444"; 
          })
          .attr("stroke-opacity", l => {
            const sid = l.source.id || l.source;
            const tid = l.target.id || l.target;
            return (sid === d.id || tid === d.id) ? 1 : 0.04; 
          });

        document.querySelectorAll("text[data-nid]").forEach(el => {
          el.style.fill = connectedIds.has(el.getAttribute("data-nid")) ? "#fff" : "#181818";
        });

        const conns = clickAdj.get(d.id) || []; 
        document.getElementById("tt-name").textContent = d.id; 
        document.getElementById("tt-name").style.color = GROUPS[d.group].color; 
        document.getElementById("tt-group").textContent = GROUPS[d.group].label; 
        const deg = degreeMap.get(d.id);
        document.getElementById("tt-degree").textContent = deg === 0
          ? "That's me"
          : deg != null ? `${ordinals[deg] || deg + "th"} degree connection` : "";
        document.getElementById("tt-links").innerHTML = conns.length
          ? conns.map(c => `<span class="rel">${c.rel}</span> <span class="name">— ${c.name}</span>`).join("<br>") 
          : "<span class='name'>No outgoing connections</span>"; 
        tooltip.classed("visible", true); 
      }

      function clearHover() {
        allNodes.forEach(grp => grp.style("opacity", 1)); 
        link.attr("stroke", "#444").attr("stroke-opacity", 0.8); 
        document.querySelectorAll("text[data-nid]").forEach(el => { el.style.fill = "#fff"; });
        tooltip.classed("visible", false); 
      }
      function moveTooltip(ev) {
        const x = ev.clientX + 18;
        const y = ev.clientY - 14;
        tooltip
          .style("left", (x + 260 > window.innerWidth ? ev.clientX - 270 : x) + "px")
          .style("top", y + "px");
      }

      node.on("mouseover", applyHover).on("mousemove", moveTooltip).on("mouseout", clearHover);
      myNodeGrp.on("mouseover", applyHover).on("mousemove", moveTooltip).on("mouseout", clearHover);

      svg.on("click", () => tooltip.classed("visible", false));


      // Source: Bostock, M. d3-force simulation.on. https://d3js.org/d3-force/simulation#simulation_on
      simulation.on("tick", () => {
        link
          .attr("x1", d => d.source.x).attr("y1", d => d.source.y) // Update edge start point
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y); // Update edge end point
        edgeLabel
          .attr("x", d => (d.source.x + d.target.x) / 2) // Keep label at edge midpoint
          .attr("y", d => (d.source.y + d.target.y) / 2);
        node.attr("transform", d => `translate(${d.x},${d.y})`);    // Move regular node groups
        myNodeGrp.attr("transform", d => `translate(${d.x},${d.y})`); // Move my node group
      });

      // Source: Bostock, M. d3-zoom transform. https://d3js.org/d3-zoom#zoomTransform
      const initScale = window.innerWidth < 600 ? 0.35 : 0.7; // Mobile gets a wider initial view
      const initTx = W / 2 - initScale * (W / 2); 
      const initTy = H / 2 - initScale * (H / 2); 
      svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(initTx, initTy).scale(initScale));


      // Source: Bostock, M. d3-force simulation.restart. https://d3js.org/d3-force/simulation#simulation_restart
      simulation.alpha(0.15).restart();


      ///// FORCE SLIDERS /////

      // Source: Bostock, M. d3-force simulation. https://d3js.org/d3-force/simulation
      function refreshSim() {
        simulation.force("link").distance(linkDist).strength(linkStrVal); 
        simulation.force("charge").strength(chargeVal);
        simulation.force("x").strength(centerVal); 
        simulation.force("y").strength(centerVal);
        simulation.alpha(0.4).restart();
      }
      // Each slider listens for the "input" event
      // Source: MDN. input event. https://developer.mozilla.org/en-US/docs/Web/API/HTMLElement/input_event
      document.getElementById("s-center").addEventListener("input", function() {
        centerVal = +this.value; 
        document.getElementById("v-center").textContent = centerVal; 
        refreshSim(); 
      });
      document.getElementById("s-charge").addEventListener("input", function() {
        chargeVal = +this.value;
        document.getElementById("v-charge").textContent = chargeVal;
        refreshSim();
      });
      document.getElementById("s-link").addEventListener("input", function() {
        linkStrVal = +this.value;
        document.getElementById("v-link").textContent = linkStrVal;
        refreshSim();
      });
      document.getElementById("s-dist").addEventListener("input", function() {
        linkDistVal = +this.value;
        document.getElementById("v-dist").textContent = linkDistVal;
        refreshSim();
      });


      ///// SHOW RELATIONSHIPS TOGGLE /////

      // Tracks whether edge labels are currently visible
      let edgeLabelsVisible = false;

      // Clicking the button flips the visibility
      // Source: MDN. Element.classList. https://developer.mozilla.org/en-US/docs/Web/API/Element/classList
      document.getElementById("toggle-elabels").addEventListener("click", function() {
        edgeLabelsVisible = !edgeLabelsVisible; // Flip the boolean
        edgeLabel.classed("visible", edgeLabelsVisible); // Add or remove the 'visible' CSS class on all labels
        this.classList.toggle("active", edgeLabelsVisible); // Update button appearance to match state
      });

    }


    ///// KEY PANEL /////

    const keyGrid = document.getElementById("key-grid");
    const HIDE_FROM_KEY = new Set(["bollywood"]); 
    // Source: MDN. Object.entries. https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Object/entries
    Object.entries(GROUPS).forEach(([k, v]) => {
      if (HIDE_FROM_KEY.has(k)) return; 
      keyGrid.innerHTML += `<div class="key-item"><div class="key-dot" style="background:${v.color}"></div>${v.label}</div>`;
    });


    ///// PANELS COLLAPSE  /////

    // Source: MDN. Element.classList.toggle. https://developer.mozilla.org/en-US/docs/Web/API/DOMTokenList/toggle
    function togglePanel(id) {
      const panel = document.getElementById(id); 
      const isCollapsed = panel.classList.toggle("collapsed"); 
      panel.querySelector(".panel-chevron").textContent = isCollapsed ? "▲" : "▼"; // Update arrow direction
    }

    document.querySelectorAll(".panel").forEach(p => {
      p.querySelector(".panel-chevron").textContent = "▼";
    });
  </script>
</body>
</html>
